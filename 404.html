<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>404 — Jayrome Vergara</title>
<meta name="robots" content="noindex,follow">
<meta name="theme-color" content="#0b0d10">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box}
  body{
    margin:0;min-height:100vh;
    font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
    background:#0b0d10;color:#e7eaf0;
    display:grid;place-items:center;
    overflow:hidden;
  }
  body::before{
    content:'';position:fixed;inset:0;
    background:
      radial-gradient(900px 500px at 85% 0%,rgba(124,92,255,.18),transparent 60%),
      radial-gradient(700px 400px at 0% 100%,rgba(34,211,238,.10),transparent 60%);
    pointer-events:none;
  }
  .wrap{position:relative;text-align:center;padding:24px;max-width:560px}
  .code{
    font-family:'JetBrains Mono',monospace;
    font-size:14px;color:#22d3ee;letter-spacing:.12em;
    text-transform:uppercase;margin-bottom:16px;
  }
  h1{
    font-size:clamp(72px,14vw,140px);
    margin:0 0 8px;font-weight:800;letter-spacing:-.04em;line-height:1;
    background:linear-gradient(135deg,#7c5cff 0%,#22d3ee 100%);
    -webkit-background-clip:text;background-clip:text;
    -webkit-text-fill-color:transparent;
  }
  h2{margin:0 0 12px;font-size:clamp(20px,3vw,28px);letter-spacing:-.02em}
  p{color:#9aa3b2;margin:0 0 28px}
  a.btn{
    display:inline-flex;align-items:center;gap:8px;
    padding:12px 22px;border-radius:10px;
    font-size:14px;font-weight:600;text-decoration:none;
    background:linear-gradient(135deg,#7c5cff 0%,#22d3ee 100%);
    color:#0b0d10;
    transition:transform .15s ease;
  }
  a.btn:hover{transform:translateY(-1px)}
</style>
</head>
<body>
  <div class="wrap">
    <p class="code">Error 404</p>
    <h1>404</h1>
    <h2>This page wandered off.</h2>
    <p>The link may be broken, or the page may have moved. Let's get you back home.</p>
    <a class="btn" href="/">
      ← Back to home
    </a>
  </div>
</body>
</html>
